<div class="container py-5">
  <h2 class="text-center fw-bold mb-5">Products</h2>

  <div class="row g-4">
    @for (product of products(); track product.id) {
      <div class="col-12 col-sm-6 col-md-4 col-lg-3">
        <div class="card h-100 shadow-sm border-0 product-card">
          <div class="d-flex justify-content-center align-items-center p-4 bg-light product-image">
            <img [src]="product.image" [alt]="product.title" class="img-fluid" />
          </div>

          <div class="card-body d-flex flex-column">
            <small class="text-uppercase text-secondary mb-2">
              {{ product.category }}
            </small>

            <h5 class="card-title">
              {{ product.title }}
            </h5>

            <p class="card-text text-muted">
              {{ product.description }}
            </p>

            <div class="mt-auto">
              <div class="d-flex justify-content-between align-items-center mb-3">
                <span class="fs-4 fw-bold text-success"> ₹ {{ product.price }} </span>

                <span class="badge bg-success text-dark"> ⭐ {{ product.rating.rate }} </span>
              </div>

              <small class="text-muted"> {{ product.rating.count }} Reviews </small>

              <button
                (click)="addProduct(product)"
                class="btn btn-dark w-100 mt-3"
                [disabled]="cartService.isInCart(product.id)"
              >
                <i class="bi bi-cart-plus me-2"></i>

                {{ cartService.isInCart(product.id) ? 'Added to Cart' : 'Add to Cart' }}
              </button>
            </div>
          </div>
        </div>
      </div>
    }
  </div>
</div>
